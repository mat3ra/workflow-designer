name: Continuous Testing and Automated NPM Publication

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with: { lfs: true }
      - uses: actions/checkout@v7
        with: { repository: Exabyte-io/actions, token: "${{ secrets.BOT_GITHUB_TOKEN }}", path: actions }
      - name: Validate JS package
        uses: ./actions/js/validate
        with: { node-version: 20.x, use-legacy-peer-deps: true }

  publish:
    needs: run-tests
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v7
        with: { lfs: true }
      - uses: actions/checkout@v7
        with: { repository: Exabyte-io/actions, token: "${{ secrets.BOT_GITHUB_TOKEN }}", path: actions }
      - name: Publish the application package and create release tag
        uses: ./actions/js/publish
        with:
          node-version: 20.x
          npm-token: ${{ secrets.NPM_TOKEN }}
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          verify-tests: false
          npm-options: '--legacy-peer-deps'
