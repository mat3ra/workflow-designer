name: Continuous Testing and Automated NPM Publication

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with: { lfs: true }
      - uses: actions/checkout@v7
        with: { repository: Exabyte-io/actions, token: "${{ secrets.BOT_GITHUB_TOKEN }}", path: actions }
      - name: Validate JS package
        uses: ./actions/js/validate
        with: { node-version: 20.x, use-legacy-peer-deps: true }

  publish:
    needs: run-tests
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v7
        with: { lfs: true }
      - uses: actions/checkout@v7
        with: { repository: Exabyte-io/actions, token: "${{ secrets.BOT_GITHUB_TOKEN }}", path: actions }
      - name: Publish the application package
        uses: ./actions/js/publish
        with:
          node-version: 20.x
          npm-token: ${{ secrets.NPM_TOKEN }}
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          verify-tests: false

  deploy-bundle:
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Build
        shell: bash -l {0}
        run: |
          npm install --legacy-peer-deps && npm run build:standalone

      - name: Deploy Build
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
